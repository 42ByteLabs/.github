name: Cargo - Publish

on:
  workflow_call:
    inputs:
      cargo:
        description: "Cargo file"
        type: string
        default: "Cargo.toml"
      crate:
        description: "Crate name"
        type: string
        required: true
      crates:
        description: "Name of creates to publish in order"
        type: string

jobs:
  cargo-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Cargo Publish"
        uses: 42bytelabs/actions/cargo/publish@0.1.1
        with:
          crates: ${{ inputs.crates }}
          cargo-token: "${{ secrets.CRATES_TOKEN }}"
          create-github-release: "false"

      - name: "GitHub Release"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.cargo-check.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git tag "${VERSION}" --force
          git push origin "${REF_NAME}"
          git push origin --tags --force

          gh release create --latest --generate-notes --title "v${VERSION}" "${VERSION}"
